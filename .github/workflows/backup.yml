name: PostgreSQL Backup to Google Drive

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client 17 & Rclone
        run: |
          # إضافة مستودع PostgreSQL الرسمي لتنزيل الإصدار 17
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 rclone

      - name: Generate Backup File
        run: |
          DATE=$(date +'%Y-%m-%d_%H-%M')
          FILENAME="dashboard_backup_$DATE.sql"
          
          # تنظيف الرابط
          CLEAN_URL=$(echo "${{ secrets.DATABASE_URL }}" | cut -d'?' -f1)
          
          # السر هنا: استدعاء الأداة من مسار الإصدار 17 مباشرة غصباً عن السيرفر
          /usr/lib/postgresql/17/bin/pg_dump "${CLEAN_URL}?sslmode=require" > $FILENAME
          gzip $FILENAME
          
          echo "BACKUP_FILE=$FILENAME.gz" >> $GITHUB_ENV

      - name: Upload to Google Drive
        env:
          GDRIVE_JSON: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: |
          echo "$GDRIVE_JSON" > sa.json
          
          cat <<EOF > rclone.conf
          [gdrive]
          type = drive
          scope = drive
          service_account_file = sa.json
          root_folder_id = ${{ secrets.GDRIVE_FOLDER_ID }}
          EOF
          
          rclone --config rclone.conf copy ${{ env.BACKUP_FILE }} gdrive: -v