name: PostgreSQL Backup to Google Drive

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client & Rclone
        run: sudo apt-get update && sudo apt-get install -y postgresql-client rclone

      - name: Generate Backup File
        run: |
          # استخراج التاريخ الحالي
          DATE=$(date +'%Y-%m-%d_%H-%M')
          FILENAME="dashboard_backup_$DATE.sql"
          
          # سحب الداتا بيز وضغطها
          pg_dump "${{ secrets.DATABASE_URL }}" > $FILENAME
          gzip $FILENAME
          
          # حفظ اسم الملف للمرحلة القادمة
          echo "BACKUP_FILE=$FILENAME.gz" >> $GITHUB_ENV

      - name: Upload to Google Drive
        run: |
          # 1. إنشاء ملف الصلاحيات السري (JSON) مؤقتاً
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' > sa.json
          
          # 2. إعداد Rclone للاتصال بمجلدك في Google Drive
          cat <<EOF > rclone.conf
          [gdrive]
          type = drive
          scope = drive
          service_account_file = sa.json
          root_folder_id = ${{ secrets.GDRIVE_FOLDER_ID }}
          EOF
          
          # 3. رفع الملف فوراً
          rclone --config rclone.conf copy ${{ env.BACKUP_FILE }} gdrive: